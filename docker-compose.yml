version: '3'
services:
  mongodb:
    image: mongo
    ports:
      - '27017:27017'
  server:
    build: .
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://mongodb:27017/modernmarket
      - JWT_SECRET=secret
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - .:/app
    command: npm run dev --prefix server
  client:
    image: node:18
    working_dir: /app/client
    volumes:
      - .:/app
    command: npm run dev
    ports:
      - '3000:3000'
    depends_on:
      - server
